<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Route Editor - Expedition</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        #map {
            position: absolute;
            inset: 0;
            right: 350px;
        }

        /* Leave room for right panel */

        /* The Right Inspector Panel for Editor */
        #editor-panel {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 350px;
            background: white;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .panel-header {
            padding: 15px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-weight: bold;
            font-size: 1.2em;
            color: #0f172a;
        }

        .panel-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .segment {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
        }

        .smart {
            background: #dcfce7;
            border-color: #bbf7d0;
            color: #166534;
        }

        .manual {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .btn-mode {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 0.8em;
        }

        /* Save Strategy Styles */
        .save-card {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #bae6fd;
            margin-bottom: 20px;
        }

        .save-card label {
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            color: #0369a1;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-weight: bold;
        }

        button.action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 1.05em;
            transition: 0.2s;
        }

        .btn-save {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        .btn-save:hover {
            background: #0284c7;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-cancel:hover {
            background: #cbd5e0;
        }

        @media (max-width: 768px) {
            #map { right: 0 !important; bottom: 45vh !important; }
            #editor-panel { width: 100% !important; top: auto !important; height: 45vh !important; border-top: 2px solid #e2e8f0; box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.1); border-radius: 20px 20px 0 0; }
            .panel-header { padding: 10px 15px; }
            .panel-content { padding: 15px; }
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div id="editor-panel">
        <div class="panel-header">
            🏔️ Route Editor
            <div style="font-size: 0.7em; color: #64748b; font-weight: normal; margin-top: 8px; line-height: 1.4;">
                • <b>Click line</b> to add stops.<br>
                • <b>Drag dots</b> to move route.<br>
                • <b>Right-click dots</b> to delete.
            </div>
        </div>

        <div class="panel-content">
            <h4 style="margin-top:0; color: #1e293b;">1. Route Segments</h4>
            <div id="segment-list"
                style="max-height: 250px; overflow-y: auto; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            </div>

            <h4 style="margin-top:0; color: #1e293b;">2. Save Strategy</h4>
            <div class="save-card">
                <label><input type="radio" name="save-mode" value="overwrite" checked> (A) Update Original Track</label>
                <label><input type="radio" name="save-mode" value="new"> (B) Save as New Independent Track</label>
                <label><input type="radio" name="save-mode" value="child"> (C) Save as Alternative / Child</label>
            </div>

            <label style="font-size: 0.85em; font-weight: bold; color: #334155;">Track Title</label>
            <input type="text" id="track-title" placeholder="Route Name">

            <label style="font-size: 0.85em; font-weight: bold; color: #334155;">External Link (Komoot, etc.)</label>
            <input type="text" id="track-link" placeholder="https://...">

            <label style="font-size: 0.85em; font-weight: bold; color: #334155;">Track Color</label>
            <input type="color" id="track-color"
                style="width:100%; height:42px; border:none; padding:0; cursor:pointer; border-radius: 6px; margin-bottom:20px;">

            <button class="action-btn btn-save" onclick="executeSave()"><i class="ph ph-floppy-disk"></i> Execute Save</button>
            <button class="action-btn btn-cancel" onclick="goBack()">Cancel & Return</button>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/route-editor.js"></script>

    <script>

        let editContext = null;

        function openStreetView(lat, lng) {
            const svUrl = `https://www.google.com/maps?layer=c&cbll=${lat},${lng}`;
            window.open(svUrl, '_blank');
        }

        async function initEditor() {
            // 1. Open the Briefcase
            const stored = sessionStorage.getItem('expedition_edit_context');
            if (!stored) {
                alert("No edit context found. Returning to dashboard.");
                window.location.href = 'index.html';
                return;
            }
            editContext = JSON.parse(stored);

            // 2. Setup Map and Config
            try {
                const res = await fetch(`${API_URL}/api/config`);
                const config = await res.json();
                mapboxgl.accessToken = config.MAPBOX_TOKEN;

                // Extraer el centro de forma segura (soporta Lines y Polygons)
                const geom = editContext.geojson.features[0].geometry;
                const centerCoord = geom.type === 'Polygon' ? geom.coordinates[0][0] : geom.coordinates[0];

                map = new mapboxgl.Map({
                    container: 'map',
                    style: 'mapbox://styles/mapbox/outdoors-v12',
                    center: centerCoord || [12.5928, 38.0662],
                    zoom: 14
                });



                // 3. Populate UI
                document.getElementById('track-title').value = editContext.title || 'Edited Route';
                document.getElementById('track-link').value = editContext.link || '';
                document.getElementById('track-color').value = editContext.color || '#3498db';

                // Safely handle brand new GPX uploads
                if (!editContext.trackId) {
                    const overwriteLabel = document.querySelector('input[value="overwrite"]').parentElement;
                    const childLabel = document.querySelector('input[value="child"]').parentElement;
                    const newRadio = document.querySelector('input[value="new"]');

                    overwriteLabel.style.display = 'none';
                    childLabel.style.display = 'none';
                    newRadio.checked = true;

                    document.getElementById('track-title').value = editContext.title ? `${editContext.title} (Imported)` : 'New GPX Route';
                }

                // 4. Wait for Load to trigger Engine
                map.on('load', async () => {
                    console.log("Editor Map Loaded. Initializing KomootEngine...");

                    map.addSource('mapbox-dem', {
                        'type': 'raster-dem',
                        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        'tileSize': 512
                    });
                    map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.2 });

                    // Initialize Komoot Engine using the GeoJSON feature from context
                    // Note: initFromGpx expects (feature, fileName, editMeta)
                    await KomootEngine.initFromGpx(
                        editContext.geojson.features[0],
                        editContext.title,
                        { config: editContext, color: editContext.color }
                    );

                    // Zoom to fit the loaded route
                    const bbox = turf.bbox(editContext.geojson);
                    map.fitBounds(bbox, { padding: 50 });
                });

                // 5. Override KomootEngine UI for the dedicated page
                KomootEngine.updateSavePopup = function () {
                    const list = document.getElementById('segment-list');
                    if (!list) return;
                    list.innerHTML = '';
                    this.state.segments.forEach((seg, idx) => {
                        const div = document.createElement('div');
                        div.className = `segment ${seg.type === 'imported' ? 'smart' : seg.type}`;
                        
                        let btnText = 'MANUAL <i class="ph ph-ruler"></i>';
                        if (seg.type === 'smart') btnText = 'SMART <i class="ph ph-car-profile"></i>';
                        if (seg.type === 'imported') btnText = 'EXACT GPX <i class="ph ph-map-pin"></i>';

                        div.innerHTML = `
                    <strong>Seg ${seg.startIdx + 1}-${seg.endIdx + 1}</strong>
                    <button class="btn-mode" onclick="KomootEngine.toggleSegmentMode(${idx}); KomootEngine.updateSavePopup();">
                        ${btnText}
                    </button>
                `;
                        list.appendChild(div);
                    });
                };

            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }

        // Start the sequence
        initEditor();

        async function executeSave() {
            const saveBtn = document.querySelector('.btn-save');
            saveBtn.innerHTML = '<i class="ph ph-floppy-disk"></i> Saving...';
            saveBtn.disabled = true;

            try {
                const strategy = document.querySelector('input[name="save-mode"]:checked').value;
                let geometry = KomootEngine.getUnifiedGeometry();

                // --- GEOMETRIC DELTA LOGIC FOR STRATEGY (C) ---
                if (strategy === 'child') {
                    const origCoords = editContext.geojson.features[0].geometry.type === 'Polygon' ?
                        editContext.geojson.features[0].geometry.coordinates[0] :
                        editContext.geojson.features[0].geometry.coordinates;
                    const newCoords = geometry.coordinates;

                    const origLine = turf.lineString(origCoords);
                    let divergeStart = -1;
                    let divergeEnd = -1;
                    const TOLERANCE_KM = 0.05; // 50 meters tolerance for snapping variations

                    // Find where the new route diverges from the original line
                    for (let i = 0; i < newCoords.length; i++) {
                        const dist = turf.pointToLineDistance(turf.point(newCoords[i]), origLine);
                        if (dist > TOLERANCE_KM) { divergeStart = i; break; }
                    }

                    // Find where it rejoins (searching backwards)
                    for (let i = newCoords.length - 1; i >= 0; i--) {
                        const dist = turf.pointToLineDistance(turf.point(newCoords[i]), origLine);
                        if (dist > TOLERANCE_KM) { divergeEnd = i; break; }
                    }

                    if (divergeStart !== -1 && divergeEnd !== -1) {
                        // Slice out ONLY the divergent section (overlapping by 1 point to connect seamlessly)
                        let sliceStart = Math.max(0, divergeStart - 1);
                        let sliceEnd = Math.min(newCoords.length, divergeEnd + 2);
                        const divergentCoords = newCoords.slice(sliceStart, sliceEnd);

                        if (divergentCoords.length >= 2) {
                            geometry = { type: 'LineString', coordinates: divergentCoords };
                        }
                    } else {
                        console.log("DEBUG: No significant divergence found beyond 50m tolerance.");
                    }
                }
                // ----------------------------------------------

                // Calculate Stats on the FINAL geometry
                const dist = turf.length(geometry, { units: 'kilometers' }).toFixed(2);
                let gain = 0, loss = 0;
                const coords = geometry.coordinates;
                for (let i = 1; i < coords.length; i++) {
                    const diff = (coords[i][2] || 0) - (coords[i - 1][2] || 0);
                    if (diff > 0) gain += diff; else loss -= diff;
                }

                const isPolygon = editContext.geojson.features[0].geometry.type === 'Polygon';
                const finalGeometry = isPolygon ? { type: 'Polygon', coordinates: [geometry.coordinates] } : geometry;

                const geojson_data = {
                    type: "FeatureCollection",
                    features: [{
                        type: "Feature",
                        geometry: finalGeometry,
                        properties: { route_type: 'smart', distance: parseFloat(dist), gain: Math.round(gain), loss: Math.round(loss) }
                    }]
                };

                const title = document.getElementById('track-title').value;
                const linkUrl = document.getElementById('track-link').value;
                const color = document.getElementById('track-color').value;

                const payload = {
                    title: title,
                    color: color,
                    link: linkUrl,
                    geojson_data: geojson_data,
                    existing_task_id: editContext.taskId,
                    parent_track_id: strategy === 'child' ? editContext.trackId : null,
                    distance: dist,
                    gain: gain.toFixed(0),
                    loss: loss.toFixed(0)
                };

                // --- DEBUGGING LOGS ---
                console.log("=== DEBUG: SAVE EXECUTED ===");
                console.log("Strategy:", strategy);
                console.log("Final Coord Count:", geometry.coordinates.length);
                console.log("Payload:", payload);
                console.log("============================");

                if (strategy === 'overwrite') {
                    await authFetch(`${API_URL}/tracks/${editContext.trackId}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                } else {
                    await authFetch(`${API_URL}/tracks`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                }

                // Leave a breadcrumb for the dashboard to catch
                sessionStorage.setItem('return_to_task', editContext.taskId);

                sessionStorage.removeItem('expedition_edit_context');
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Save Error:", error);
                alert("Error saving track: " + error.message);
                saveBtn.innerHTML = '<i class="ph ph-floppy-disk"></i> Execute Save';
                saveBtn.disabled = false;
            }
        }

        function goBack() {
            sessionStorage.removeItem('expedition_edit_context');
            window.location.href = 'index.html';
        }

    </script>
</body>

</html>
