<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Expedition Ecosystem v2.0 - Logistics Dashboard</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css"
        type="text/css">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #left-panel {
            width: 450px;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #ccc;
            background: #f8f9fa;
        }

        #asana-container-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        #form-container {
            padding: 15px;
            border-top: 2px solid #ddd;
            background: white;
            max-height: 60vh;
            overflow-y: auto;
        }

        #map {
            flex: 1;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 3px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }

        button:hover {
            background: #2980b9;
        }

        .save-btn {
            background: #27ae60;
        }

        .save-btn:hover {
            background: #219150;
        }

        .track-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 0.9em;
        }

        .track-item:hover {
            background: #f0f0f0;
        }

        #track-list {
            margin-top: 15px;
            border-top: 2px solid #3498db;
            padding-top: 10px;
        }

        .draw-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .draw-controls button {
            flex: 1;
            font-size: 0.8em;
            padding: 8px 4px;
            background: #9b59b6;
        }
    </style>
</head>

<body>

    <div id="left-panel">
        <div id="asana-container-wrapper">
            <h2>Project Plan</h2>
            <div id="asana-container"></div>
        </div>

        <div id="form-container">
            <h2>Command Center</h2>

            <div class="draw-controls">
                <button onclick="draw.changeMode('draw_point')">📍 Waypoint</button>
                <button onclick="draw.changeMode('draw_line_string')">📈 Track</button>
                <button onclick="draw.changeMode('draw_polygon')">🛑 Zone</button>
            </div>

            <div class="form-group">
                <label>Link to Existing Task (Optional)</label>
                <select id="existing-task">
                    <option value="">-- Create New Task --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="wp-title" placeholder="Waypoint or Track Title">
            </div>

            <div class="form-group">
                <label>Target Group</label>
                <select id="target-group">
                    <option value="Hikers">Hikers</option>
                    <option value="Runners">Runners</option>
                    <option value="Staff">Staff</option>
                    <option value="Transport">Transport</option>
                </select>
            </div>

            <div class="form-group">
                <label>Waypoint Category (if pin)</label>
                <select id="wp-category">
                    <option value="none">N/A (Track)</option>
                    <option value="Restaurant">Restaurant</option>
                    <option value="Accommodation">Accommodation</option>
                    <option value="Checkpoint">Checkpoint</option>
                    <option value="Bus Stop">Bus Stop</option>
                </select>
            </div>

            <div class="form-group">
                <label>Day Label</label>
                <input type="text" id="day-label" placeholder="Friday - Day 1">
            </div>

            <div class="form-group">
                <label>Starts At</label>
                <input type="datetime-local" id="starts-at">
            </div>

            <div class="form-group">
                <label>Ends At</label>
                <input type="datetime-local" id="ends-at">
            </div>

            <div class="form-group">
                <label>Description / Task Name</label>
                <textarea id="wp-description" rows="2"></textarea>
            </div>

            <div class="form-group">
                <label>Responsible Person</label>
                <input type="text" id="responsible" placeholder="Name">
            </div>

            <div class="form-group">
                <label><input type="checkbox" id="is-completed"> Mark Task as Completed</label>
            </div>

            <button id="unified-save-btn" class="save-btn">Save to Map</button>

            <div class="form-group" style="margin-top:15px;">
                <label>Upload GPX Track</label>
                <input type="file" id="gpx-file" accept=".gpx">
            </div>

            <div id="track-list">
                <strong>Active Tracks</strong>
                <div id="tracks-container"></div>
            </div>

            <button onclick="syncDbSchema()" style="margin-top:20px; background:#34495e;">Sync DB Schema</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const API_URL = 'https://mapbox-api-uz9a.onrender.com';
        let map;
        let draw;
        let activeMarkers = [];
        let activeTrackId = null;
        let ADMIN_KEY = null;
        let allTracks = [];

        async function initializeApp() {
            const configRes = await fetch(`${API_URL}/api/config`);
            const config = await configRes.json();
            mapboxgl.accessToken = config.MAPBOX_TOKEN;
            ADMIN_KEY = config.ADMIN_KEY;

            map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/outdoors-v12',
                center: [2.1734, 41.3851], // Barcelona
                zoom: 12
            });

            draw = new MapboxDraw({
                displayControlsDefault: false,
                controls: {
                    line_string: true,
                    polygon: true,
                    point: true,
                    trash: true
                }
            });
            map.addControl(draw);

            map.on('load', () => {
                loadTracks();
                loadWaypoints();
                renderProjectView();
            });
        }

        initializeApp();

        const groupColors = {
            'Hikers': '#2ecc71',
            'Runners': '#e67e22',
            'Staff': '#9b59b6',
            'Transport': '#f1c40f'
        };

        async function loadTracks() {
            const res = await fetch(`${API_URL}/tracks`);
            const tracks = await res.json();
            allTracks = tracks;
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';

            tracks.forEach(track => {
                const el = document.createElement('div');
                el.className = 'track-item';
                el.innerHTML = `<strong>${track.title}</strong> (${track.target_group})`;
                el.onclick = () => editTrack(track);
                container.appendChild(el);

                if (map.getSource(`track-${track.id}`)) {
                    map.removeLayer(`layer-${track.id}`);
                    map.removeSource(`track-${track.id}`);
                }

                map.addSource(`track-${track.id}`, {
                    type: 'geojson',
                    data: track.geojson_data
                });

                const isPolygon = track.geojson_data.features[0].geometry.type === 'Polygon';
                map.addLayer({
                    id: `layer-${track.id}`,
                    type: isPolygon ? 'fill' : 'line',
                    source: `track-${track.id}`,
                    layout: isPolygon ? {} : { 'line-join': 'round', 'line-cap': 'round' },
                    paint: isPolygon 
                        ? { 'fill-color': groupColors[track.target_group] || track.color || '#3498db', 'fill-opacity': 0.4 } 
                        : { 'line-color': groupColors[track.target_group] || track.color || '#3498db', 'line-width': 4 }
                });
            });
        }

        async function loadWaypoints() {
            const res = await fetch(`${API_URL}/itinerary`);
            const items = await res.json();

            activeMarkers.forEach(m => m.remove());
            activeMarkers = [];

            const dropdown = document.getElementById('existing-task');
            dropdown.innerHTML = '<option value="">-- Create New Task --</option>';

            items.forEach(item => {
                const option = document.createElement('option');
                option.value = item.task_id;
                option.textContent = item.task;
                dropdown.appendChild(option);

                if (item.lat && item.lng) {
                    const marker = new mapboxgl.Marker({ color: groupColors[item.target_group] || '#FF0000' })
                        .setLngLat([item.lng, item.lat])
                        .setPopup(new mapboxgl.Popup().setHTML(`
                        <strong>${item.waypoint}</strong><br>
                        Task: ${item.task}
                    `))
                        .addTo(map);
                    activeMarkers.push(marker);
                }
            });
        }

        function editTrack(track) {
            activeTrackId = track.id;
            draw.deleteAll();
            draw.add(track.geojson_data);
            document.getElementById('wp-title').value = track.title;
            document.getElementById('target-group').value = track.target_group || 'Hikers';

            const coordinates = track.geojson_data.features[0].geometry.coordinates;
            const bounds = (track.geojson_data.features[0].geometry.type === 'Polygon')
                ? coordinates[0].reduce((acc, coord) => acc.extend(coord), new mapboxgl.LngLatBounds(coordinates[0][0], coordinates[0][0]))
                : coordinates.reduce((acc, coord) => acc.extend(coord), new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));
            map.fitBounds(bounds, { padding: 50 });
        }

        document.getElementById('gpx-file').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function (event) {
                const parser = new DOMParser();
                const gpx = parser.parseFromString(event.target.result, 'text/xml');
                const geojson = toGeoJSON.gpx(gpx);
                draw.add(geojson);
            };
            reader.readAsText(file);
        });

        document.getElementById('unified-save-btn').onclick = async () => {
            const data = draw.getAll();
            if (data.features.length === 0) {
                alert("Please draw something on the map first.");
                return;
            }

            const feature = data.features[data.features.length - 1];
            const type = feature.geometry.type;
            const existingTaskId = document.getElementById('existing-task').value || null;

            let payload = {
                title: document.getElementById('wp-title').value,
                target_group: document.getElementById('target-group').value,
                existing_task_id: existingTaskId,
                tasks: existingTaskId ? [] : [{
                    name: document.getElementById('wp-description').value || document.getElementById('wp-title').value,
                    responsible: document.getElementById('responsible').value,
                    target_group: document.getElementById('target-group').value,
                    day_label: document.getElementById('day-label').value,
                    starts_at: document.getElementById('starts-at').value || null,
                    ends_at: document.getElementById('ends-at').value || null,
                    is_completed: document.getElementById('is-completed').checked,
                    characteristics: ''
                }]
            };

            let endpoint = '';
            if (type === 'Point') {
                endpoint = '/waypoints';
                payload.lat = feature.geometry.coordinates[1];
                payload.lng = feature.geometry.coordinates[0];
                payload.description = document.getElementById('wp-description').value;
                payload.category = document.getElementById('wp-category').value;
            } else {
                endpoint = activeTrackId ? `/tracks/${activeTrackId}` : '/tracks';
                payload.geojson_data = data;
                payload.color = groupColors[payload.target_group];
            }

            const res = await fetch(`${API_URL}${endpoint}`, {
                method: activeTrackId && type !== 'Point' ? 'PUT' : 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-api-key': ADMIN_KEY
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Saved successfully!");
                activeTrackId = null;
                draw.deleteAll();
                loadTracks();
                loadWaypoints();
                renderProjectView();
                document.getElementById('wp-title').value = '';
                document.getElementById('wp-description').value = '';
                document.getElementById('responsible').value = '';
                document.getElementById('is-completed').checked = false;
            }
        };

        async function renderProjectView() {
            const res = await fetch(`${API_URL}/itinerary`);
            const items = await res.json();
            const container = document.getElementById('asana-container');
            container.innerHTML = '';

            const days = {};
            items.forEach(item => {
                const day = item.day_label || 'Unscheduled';
                if (!days[day]) days[day] = [];
                days[day].push(item);
            });

            for (const [day, tasks] of Object.entries(days)) {
                const dayEl = document.createElement('div');
                dayEl.innerHTML = `<h3 style="border-bottom:2px solid #3498db; margin-top:20px; padding-bottom:5px;">${day}</h3>`;
                
                tasks.forEach(task => {
                    const startTime = task.starts_at ? new Date(task.starts_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                    const taskEl = document.createElement('div');
                    const statusStyle = task.is_completed ? "opacity:0.6; text-decoration:line-through;" : "";
                    const checkmark = task.is_completed ? "✅ " : "";
                    
                    taskEl.style.cssText = `background:white; padding:10px; margin-bottom:10px; border-left:4px solid ${groupColors[task.target_group] || '#ccc'}; border-radius:4px; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; ${statusStyle}`;
                    taskEl.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <div style="font-weight:bold; color:#2c3e50;">${checkmark}${task.waypoint}</div>
                            <div style="font-size:0.8em; color:#3498db; font-weight:bold;">${startTime}</div>
                        </div>
                        <div style="font-size:0.85em; color:#7f8c8d; margin-top:4px;">${task.task}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                            <span style="font-size:0.75em; background:#ecf0f1; padding:2px 6px; border-radius:10px; color:#34495e;">${task.responsible}</span>
                            <span style="font-size:0.75em; color:${groupColors[task.target_group]}; font-weight:bold;">${task.target_group}</span>
                        </div>
                    `;
                    taskEl.onclick = () => {
                        if (task.linked_track_id) {
                            const track = allTracks.find(t => t.id === task.linked_track_id);
                            if (track && track.geojson_data) {
                                const coordinates = track.geojson_data.features[0].geometry.coordinates;
                                const bounds = (track.geojson_data.features[0].geometry.type === 'Polygon')
                                    ? coordinates[0].reduce((acc, coord) => acc.extend(coord), new mapboxgl.LngLatBounds(coordinates[0][0], coordinates[0][0]))
                                    : coordinates.reduce((acc, coord) => acc.extend(coord), new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));
                                map.fitBounds(bounds, { padding: 50 });
                            }
                        } else if (task.lat && task.lng) {
                            map.flyTo({ center: [task.lng, task.lat], zoom: 16 });
                        }
                    };
                    dayEl.appendChild(taskEl);
                });
                container.appendChild(dayEl);
            }
        }

        async function syncDbSchema() {
            const res = await fetch(`${API_URL}/setup-db`, {
                headers: { 'x-api-key': ADMIN_KEY }
            });
            if (res.ok) {
                alert("Database schema synchronized successfully!");
                loadWaypoints();
            } else {
                alert("Schema sync failed.");
            }
        }
    </script>
</body>
</html>
