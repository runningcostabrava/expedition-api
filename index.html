<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Expedition Ecosystem v2.0 - Logistics Dashboard</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css"
        type="text/css">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        .sidebar {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            z-index: 1;
            max-height: 90vh;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 3px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }

        button:hover {
            background: #2980b9;
        }

        .save-btn {
            background: #27ae60;
        }

        .save-btn:hover {
            background: #219150;
        }

        .track-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 0.9em;
        }

        .track-item:hover {
            background: #f0f0f0;
        }

        #track-list {
            margin-top: 15px;
            border-top: 2px solid #3498db;
            padding-top: 10px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Logistics Dashboard</h2>

        <div class="form-group">
            <label>Upload GPX Track</label>
            <input type="file" id="gpx-file" accept=".gpx">
        </div>

        <hr>

        <div class="form-group">
            <label>Title</label>
            <input type="text" id="wp-title" placeholder="Waypoint or Track Title">
        </div>

        <div class="form-group">
            <label>Target Group</label>
            <select id="target-group">
                <option value="Hikers">Hikers</option>
                <option value="Runners">Runners</option>
                <option value="Staff">Staff</option>
                <option value="Transport">Transport</option>
            </select>
        </div>

        <div class="form-group">
            <label>Waypoint Category (if pin)</label>
            <select id="wp-category">
                <option value="none">N/A (Track)</option>
                <option value="Restaurant">Restaurant</option>
                <option value="Accommodation">Accommodation</option>
                <option value="Checkpoint">Checkpoint</option>
                <option value="Bus Stop">Bus Stop</option>
            </select>
        </div>

        <div class="form-group">
            <label>Day Label</label>
            <input type="text" id="day-label" placeholder="Friday - Day 1">
        </div>

        <div class="form-group">
            <label>Description / Task Name</label>
            <textarea id="wp-description" rows="2"></textarea>
        </div>

        <div class="form-group">
            <label>Responsible Person</label>
            <input type="text" id="responsible" placeholder="Name">
        </div>

        <button id="save-btn" class="save-btn">Save Waypoint/Task</button>
        <button id="save-track-btn" style="display:none;">Save Edited Track</button>

        <div id="track-list">
            <strong>Active Tracks</strong>
            <div id="tracks-container"></div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Asana-Style Project Management View -->
    <div id="project-view" style="display:none; position:absolute; top:10px; right:10px; width:400px; background:rgba(255,255,255,0.95); z-index:2; padding:20px; border-radius:8px; box-shadow:0 0 20px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0;">Project Plan</h2>
            <button onclick="document.getElementById('project-view').style.display='none'" style="width:auto; padding:5px 10px; background:#e74c3c;">Close</button>
        </div>
        <div id="asana-container"></div>
    </div>

    <button onclick="toggleProjectView()" style="position:absolute; bottom:30px; right:30px; width:150px; z-index:1; background:#8e44ad;">View Project Plan</button>

    <script>
        const API_URL = 'https://mapbox-api-uz9a.onrender.com';
        let map;
        let draw;

        let ADMIN_KEY = null;

        async function initializeApp() {
            // 1. Securely fetch the token from your Render backend
            const configRes = await fetch(`${API_URL}/api/config`);
            const config = await configRes.json();
            mapboxgl.accessToken = config.MAPBOX_TOKEN;
            ADMIN_KEY = config.ADMIN_KEY;

            // 2. Initialize Map
            map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/outdoors-v12',
                center: [2.1734, 41.3851], // Barcelona
                zoom: 12
            });

            // 3. Initialize Draw Tools
            draw = new MapboxDraw({
                displayControlsDefault: false,
                controls: {
                    line_string: true,
                    point: true,
                    trash: true
                }
            });
            map.addControl(draw);

            // 4. Load Data once map is ready
            map.on('load', () => {
                loadTracks();
                loadWaypoints();
                renderProjectView();
            });
        }

        // Boot up the app
        initializeApp();

        let activeTrackId = null;

        const groupColors = {
            'Hikers': '#2ecc71',
            'Runners': '#e67e22',
            'Staff': '#9b59b6',
            'Transport': '#f1c40f'
        };

        async function loadTracks() {
            const res = await fetch(`${API_URL}/tracks`);
            const tracks = await res.json();
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';

            tracks.forEach(track => {
                const el = document.createElement('div');
                el.className = 'track-item';
                el.innerHTML = `<strong>${track.title}</strong> (${track.target_group})`;
                el.onclick = () => editTrack(track);
                container.appendChild(el);

                // Add to map as layer
                if (map.getSource(`track-${track.id}`)) {
                    map.removeLayer(`layer-${track.id}`);
                    map.removeSource(`track-${track.id}`);
                }

                map.addSource(`track-${track.id}`, {
                    type: 'geojson',
                    data: track.geojson_data
                });

                map.addLayer({
                    id: `layer-${track.id}`,
                    type: 'line',
                    source: `track-${track.id}`,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': groupColors[track.target_group] || track.color || '#3498db',
                        'line-width': 4
                    }
                });
            });
        }

        async function loadWaypoints() {
            const res = await fetch(`${API_URL}/itinerary`);
            const items = await res.json();

            items.forEach(item => {
                if (item.lat && item.lng) {
                    new mapboxgl.Marker({ color: groupColors[item.target_group] || '#FF0000' })
                        .setLngLat([item.lng, item.lat])
                        .setPopup(new mapboxgl.Popup().setHTML(`
                        <strong>${item.waypoint}</strong><br>
                        Category: ${item.waypoint_category}<br>
                        Task: ${item.task}<br>
                        Group: ${item.target_group}<br>
                        Day: ${item.day_label}
                    `))
                        .addTo(map);
                }
            });
        }

        function editTrack(track) {
            activeTrackId = track.id;
            draw.deleteAll();
            const featureIds = draw.add(track.geojson_data);
            document.getElementById('wp-title').value = track.title;
            document.getElementById('target-group').value = track.target_group || 'Hikers';
            document.getElementById('save-track-btn').style.display = 'block';

            // Fit bounds
            const coordinates = track.geojson_data.features[0].geometry.coordinates;
            const bounds = coordinates.reduce((acc, coord) => {
                return acc.extend(coord);
            }, new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));
            map.fitBounds(bounds, { padding: 50 });
        }

        // GPX Upload
        document.getElementById('gpx-file').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function (event) {
                const parser = new DOMParser();
                const gpx = parser.parseFromString(event.target.result, 'text/xml');
                const geojson = toGeoJSON.gpx(gpx);
                draw.add(geojson);

                if (geojson.features.length > 0) {
                    const coords = geojson.features[0].geometry.coordinates;
                    map.flyTo({ center: coords[0], zoom: 14 });
                }
            };
            reader.readAsText(file);
        });

        // Save Waypoint/Task
        document.getElementById('save-btn').onclick = async () => {
            const data = draw.getAll();
            const point = data.features.find(f => f.geometry.type === 'Point');

            if (!point) {
                alert("Please drop a point on the map first for a Waypoint.");
                return;
            }

            const payload = {
                title: document.getElementById('wp-title').value,
                lat: point.geometry.coordinates[1],
                lng: point.geometry.coordinates[0],
                description: document.getElementById('wp-description').value,
                category: document.getElementById('wp-category').value,
                tasks: [{
                    name: document.getElementById('wp-description').value,
                    responsible: document.getElementById('responsible').value,
                    target_group: document.getElementById('target-group').value,
                    day_label: document.getElementById('day-label').value,
                    characteristics: ''
                }]
            };

            const res = await fetch(`${API_URL}/waypoints`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-api-key': ADMIN_KEY
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Waypoint saved!");
                location.reload();
            }
        };

        // Save Edited Track
        document.getElementById('save-track-btn').onclick = async () => {
            const data = draw.getAll();
            if (data.features.length === 0) return;

            const payload = {
                title: document.getElementById('wp-title').value,
                target_group: document.getElementById('target-group').value,
                geojson_data: data,
                color: groupColors[document.getElementById('target-group').value]
            };

            let url = `${API_URL}/tracks`;
            let method = 'POST';

            if (activeTrackId) {
                url = `${API_URL}/tracks/${activeTrackId}`;
                method = 'PUT';
            }

            const res = await fetch(url, {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'x-api-key': ADMIN_KEY
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Track saved!");
                activeTrackId = null;
                document.getElementById('save-track-btn').style.display = 'none';
                loadTracks();
            }
        };

        async function renderProjectView() {
            const res = await fetch(`${API_URL}/itinerary`);
            const items = await res.json();
            const container = document.getElementById('asana-container');
            container.innerHTML = '';

            // Group by day
            const days = {};
            items.forEach(item => {
                const day = item.day_label || 'Unscheduled';
                if (!days[day]) days[day] = [];
                days[day].push(item);
            });

            for (const [day, tasks] of Object.entries(days)) {
                const dayEl = document.createElement('div');
                dayEl.innerHTML = `<h3 style="border-bottom:2px solid #3498db; margin-top:20px; padding-bottom:5px;">${day}</h3>`;
                
                tasks.forEach(task => {
                    const taskEl = document.createElement('div');
                    taskEl.style.cssText = "background:white; padding:10px; margin-bottom:10px; border-left:4px solid " + (groupColors[task.target_group] || '#ccc') + "; border-radius:4px; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer;";
                    taskEl.innerHTML = `
                        <div style="font-weight:bold; color:#2c3e50;">${task.waypoint}</div>
                        <div style="font-size:0.85em; color:#7f8c8d; margin-top:4px;">${task.task}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                            <span style="font-size:0.75em; background:#ecf0f1; padding:2px 6px; border-radius:10px; color:#34495e;">${task.responsible}</span>
                            <span style="font-size:0.75em; color:${groupColors[task.target_group]}; font-weight:bold;">${task.target_group}</span>
                        </div>
                    `;
                    taskEl.onclick = () => {
                        if (task.lat && task.lng) {
                            map.flyTo({ center: [task.lng, task.lat], zoom: 16 });
                        }
                    };
                    dayEl.appendChild(taskEl);
                });
                container.appendChild(dayEl);
            }
        }

        function toggleProjectView() {
            const view = document.getElementById('project-view');
            if (view.style.display === 'none') {
                view.style.display = 'block';
                renderProjectView();
            } else {
                view.style.display = 'none';
            }
        }

    </script>

</body>

</html>
