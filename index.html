                    if (taskRes.ok) {
                        const newTask = await taskRes.json();
                        finalTaskId = newTask.id;
                    }
                } else {
                    // Strictly update existing task to prevent data loss
                    await authFetch(`${API_URL}/tasks/${existingTaskId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(taskData) });
                }

                // 2. Save/Update Geometry SECOND (if drawn)
                if (features.length > 0) {
                    const feat = features[0];
                    if (isEditingGeometry) {
                        // Update existing shape and ensure it links to the task
                        if (activeWaypointId) {
                            await authFetch(`${API_URL}/waypoints/${activeWaypointId}`, {
                                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: taskData.task_name, color: geomColor, existing_task_id: finalTaskId, lat: feat.geometry.coordinates[1], lng: feat.geometry.coordinates[0] })
                            });
                        } else if (activeTrackId) {
                            await authFetch(`${API_URL}/tracks/${activeTrackId}`, {
                                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: taskData.task_name, color: geomColor, existing_task_id: finalTaskId, geojson_data: { type: 'FeatureCollection', features } })
                            });
                        }

                        if (feat.geometry.type === 'Point') {
                            await authFetch(`${API_URL}/waypoints`, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: taskData.task_name, color: geomColor, existing_task_id: finalTaskId, lat: feat.geometry.coordinates[1], lng: feat.geometry.coordinates[0] })
                            });
                        } else {
                            await authFetch(`${API_URL}/tracks`, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: taskData.task_name, color: geomColor, existing_task_id: finalTaskId, geojson_data: { type: 'FeatureCollection', features } })
                            });

                }

                closeModal();

            const stops = track?.geojson?.features?.[0]?.properties?.stops;

            // MapboxDirections needs a slight delay to initialize before setting points

        async function updateTaskInline(taskId, field, value) {
            const task = AppStore.get('itinerary').find(t => t.task_id === taskId);
            // Null-safe comparison to prevent crashes
            if (!task || String(task[field] || "") === String(value || "")) return;

            let payload = { ...task };
            if (field === 'starts_at') {
                if (!value) { payload.starts_at = null; }
                else {
                    // Extract Date: Use existing starts_at, OR the parent Section's date, OR default to today
                    let datePart;
                    if (task.starts_at) {
                        datePart = task.starts_at.split('T')[0];
                    } else if (task.section_id) {
                        const sec = (AppStore.get('sections') || []).find(s => s.id === task.section_id);
                        datePart = (sec && sec.section_date) ? new Date(sec.section_date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
                    } else {
                        datePart = new Date().toISOString().split('T')[0];
                    }
                    payload.starts_at = `${datePart}T${value}:00.000Z`;
                }
            } else {
                payload[field] = value;
            }

            try {
                const res = await authFetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Server Error");
                refreshData();
            } catch (e) { console.error("Inline Update Failed:", e); }
        }

        function exportTaskToGPX(taskId) {
            const task = AppStore.get('itinerary').find(t => t.task_id === taskId);
            if (!task || !task.geometries || task.geometries.length === 0) return alert('No locations to export for this task.');

            let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="ExpeditionDashboard">';
            task.geometries.forEach(g => {
                if (g.kind === 'point') {
                    gpx += `<wpt lat="${g.lat}" lon="${g.lng}"><name>${g.title || 'Waypoint'}</name></wpt>`;
                } else if (g.geojson) {
                    gpx += `<trk><name>${g.title || 'Track'}</name><trkseg>`;
                    const coords = g.geojson.features[0].geometry.coordinates;
                    const points = g.geojson.features[0].geometry.type === 'Polygon' ? coords[0] : coords;
                    points.forEach(c => { gpx += `<trkpt lat="${c[1]}" lon="${c[0]}"><ele>${c[2] || 0}</ele></trkpt>`; });
                    gpx += `</trkseg></trk>`;
                }
            });
            gpx += '</gpx>';

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const tName = task.task_name || task.task || 'export';
            a.download = `${tName.replace(/\s+/g, '_')}.gpx`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function renderProjectView() {
            const container = document.getElementById('asana-container');
            const searchTerm = document.getElementById('search-filter').value.toLowerCase();
            const groupFilter = document.getElementById('group-filter').value;
            const typeFilter = document.getElementById('type-filter').value;
            container.innerHTML = '';

            // 1. Calculate grid columns first so renderSectionUI can use them
            const showCategory = document.getElementById('col-category').checked;
            const showAssignee = document.getElementById('col-assignee').checked;
            const showTime = document.getElementById('col-time').checked;
            const showGroup = document.getElementById('col-group').checked;

            // Redefined: WIDER title (2.5fr) and NARROWER category (100px)
            let gridCols = '2.5fr ';
            if (showCategory) gridCols += '100px ';
            if (showAssignee) gridCols += '1fr ';
            if (showTime) gridCols += '80px ';
            if (showGroup) gridCols += '90px ';
            gridCols += '100px';

            // 2. Filter tasks
            // Pull directly from the Store
            let filtered = AppStore.get('itinerary').filter(t => {
                const name = t.task_name || t.task || "";
                const matchSearch = name.toLowerCase().includes(searchTerm);
                const matchGroup = !groupFilter || t.target_group === groupFilter;
                const matchType = !typeFilter || t.task_type_id == typeFilter;
                return matchSearch && matchGroup && matchType;
            });

            // Auto-sort tasks chronologically strictly by time (ignoring corrupted dates)
            filtered.sort((a, b) => {
                if (!a.starts_at && !b.starts_at) return 0;
                if (!a.starts_at) return 1; // Send empty times to the bottom
                if (!b.starts_at) return -1;

                // Extract just the "HH:MM" string for bulletproof sorting within the day
                const timeA = a.starts_at.length >= 16 ? a.starts_at.substring(11, 16) : '23:59';
                const timeB = b.starts_at.length >= 16 ? b.starts_at.substring(11, 16) : '23:59';
                return timeA.localeCompare(timeB);
            });

            // 3. Group by section_id
            const groups = {};
            filtered.forEach(task => {
                const sectionId = task.section_id || 'unscheduled';
                if (!groups[sectionId]) groups[sectionId] = [];
                groups[sectionId].push(task);
            });

            // 4. Render sections using the Store
            AppStore.get('sections').forEach(section => {
                const tasks = groups[section.id] || [];
                renderSectionUI(section, tasks, gridCols);
            });

            if (groups['unscheduled']) {
                renderSectionUI({ title: 'Unscheduled', id: null }, groups['unscheduled'], gridCols);
            }

            // 5. Add "New Section" button at the bottom
            const newSectionDiv = document.createElement('div');
            newSectionDiv.style.marginTop = '30px';
            newSectionDiv.innerHTML = `<input type="date" title="Add New Day" style="padding:10px; border:1px solid #ddd; border-radius:6px; cursor:pointer; background:#fff; color:#333; font-weight:bold; outline:none;" onchange="if(this.value) { createSection(this.value); this.value=''; }"> <span style="font-size:0.85em; color:#7f8c8d; margin-left:10px;">+ Add Date Section</span>`;
            container.appendChild(newSectionDiv);

            // Initialize Sortable JS for BOTH sections and nested subtasks
            document.querySelectorAll('.sortable-task-list, .subtask-list').forEach(list => {
                new Sortable(list, {
                    group: 'shared',
                    animation: 150,
                    fallbackOnBody: true,
                    swapThreshold: 0.65,
                    filter: '.inline-edit, .edit-btn, .delete-btn, input, select', // Tells Sortable to ignore these items
                    preventOnFilter: false, // Allows your mouse click to pass through to the text cursor
                    onEnd: async function (evt) {
                        const itemEl = evt.item; // The dragged card
                        const toList = evt.to;   // The drop zone it landed in

                        const taskRow = itemEl.querySelector('.task-row');
                        if (!taskRow) return;
                        const taskId = parseInt(taskRow.id.replace('task-row-', ''));
                        const task = AppStore.get('itinerary').find(t => t.task_id === taskId);
                        if (!task) return;

                        let needsUpdate = false;
                        let payload = { ...task };

                        if (toList.classList.contains('subtask-list')) {
                            // Dropped inside another task (became a subtask)
                            const newParentId = parseInt(toList.dataset.parentId);
                            if (payload.parent_id !== newParentId) {
                                payload.parent_id = newParentId;
                                needsUpdate = true;
                            }

                            // Inherit the day_label from the new parent task
                            const parentTask = AppStore.get('itinerary').find(t => t.task_id === newParentId);
                            if (parentTask && payload.day_label !== parentTask.day_label) {
                                payload.day_label = parentTask.day_label;
                                needsUpdate = true;
                            }
                        } else {
                            // Dropped in a main section (became a top-level task)
                            const newSectionIdStr = toList.dataset.sectionId;
                            const newSectionId = newSectionIdStr && newSectionIdStr !== 'null' ? parseInt(newSectionIdStr) : null;

                            if (payload.parent_id !== null) {
                                payload.parent_id = null;
                                needsUpdate = true;
                            }
                            if (payload.section_id !== newSectionId) {
                                payload.section_id = newSectionId;
                                needsUpdate = true;
                            }
                        }

                        if (needsUpdate) {
                            try {
                                await authFetch(`${API_URL}/tasks/${taskId}`, {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(payload)
                                });
                            } catch (e) {
                                console.error("Drag Update Failed:", e);
                            }
                        }

                        // --- NEW: Calculate and save the new sort_order for the entire list ---
                        const siblingCards = Array.from(toList.children).filter(el => el.classList.contains('task-row') || el.classList.contains('fite-row') || el.querySelector('.task-row, .fite-row'));

                        const newOrderPayload = siblingCards.map((el, index) => {
                            const row = el.classList.contains('task-row') || el.classList.contains('fite-row') ? el : el.querySelector('.task-row, .fite-row');
                            const id = parseInt(row.id.replace('task-row-', ''));
                            return { id: id, sort_order: index };
                        }).filter(item => !isNaN(item.id));

                        if (newOrderPayload.length > 0) {
                            try {
                                await authFetch(`${API_URL}/tasks/reorder`, {
                                    method: 'PATCH',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ tasks: newOrderPayload })
                                });
                            } catch (e) {
                                console.error("Reorder Failed:", e);
                            }
                        }

                        refreshData(); // Triggers a re-render to enforce chronological order
                    }
                });
            });
        }

                let displayTitle = g.title || 'Location';
                let d = g.distance;
                let elevGain = g.gain;
                let elevLoss = g.loss;

                // ON-THE-FLY CALCULATION: Instantly calculate stats if DB missed them
                if (g.kind === 'line' && g.geojson) {
                    const coords = g.geojson.features[0].geometry.type === 'Polygon' ? g.geojson.features[0].geometry.coordinates[0] : g.geojson.features[0].geometry.coordinates;

                    if (!elevGain && !elevLoss) {
                        let cg = 0, cl = 0;
                        for (let i = 1; i < coords.length; i++) {
                            const diff = (coords[i][2] || 0) - (coords[i - 1][2] || 0);
                            if (diff > 0) cg += diff; else cl -= diff;
                        }
                        elevGain = cg.toFixed(0);
                        elevLoss = cl.toFixed(0);
                    }
                }

                const hasStats = d || elevGain || elevLoss;

                let html = `
                    <div class="geom-row ${isNested ? 'nested-geom' : ''}" style="border-left: 4px solid ${color};">
                        <div class="geom-header-layout">

                            <div class="geom-left-controls">
                                <button class="visibility-btn ${!isVisible ? 'hidden' : ''}" title="Toggle Visibility" onclick="event.stopPropagation(); toggleLayerVisibility('${layerId}', this)">${isVisible ? '👁️' : '🙈'}</button>
                                <span style="font-size: 1.2em;">${emoji}</span>
                            </div>

                            <div class="geom-main-content" onclick="event.stopPropagation(); flyToGeometry(${g.lng}, ${g.lat}, '${g.kind}', '${layerId}')">
                                <div class="geom-title">${displayTitle}</div>

                                ${hasStats ? `
                                <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                                    ${d ? `<span class="stat-badge">📏 ${parseFloat(d).toFixed(2)}km</span>` : ''}
                                    ${elevGain ? `<span class="stat-badge gain">▲ +${parseFloat(elevGain).toFixed(0)}m</span>` : ''}
                                    ${elevLoss ? `<span class="stat-badge loss">▼ -${Math.abs(parseFloat(elevLoss)).toFixed(0)}m</span>` : ''}
                                </div>` : ''}

                                ${g.comments ? `<div style="font-size:0.85em; color:#718096; font-style:italic;">📝 ${g.comments}</div>` : ''}
                            </div>

                            <div class="geom-actions">
                                ${g.link ? `<a href="${g.link.startsWith('http') ? g.link : 'https://' + g.link}" target="_blank" class="action-icon-btn" title="Open Link" onclick="event.stopPropagation()">🔗</a>` : ''}
                                ${g.kind === 'line' ? `<button class="action-icon-btn" title="Analyze Segment" onclick="event.stopPropagation(); startSegmentAnalysis(${task.task_id}, ${g.track_id})">📊</button>` : ''}
                                <button class="action-icon-btn" title="Edit Location" onclick="event.stopPropagation(); startEditGeometry(${task.task_id}, ${g.anchor_id})">⚙️</button>
                                <button class="action-icon-btn delete" title="Delete Location" onclick="event.stopPropagation(); deleteGeometry('${g.kind}', ${g.waypoint_id || g.track_id})">🗑️</button>
                            </div>

                        </div>
                    </div>`;

                // Use == instead of === to prevent string/integer mismatch bugs
                const myChildren = children.filter(child => child.parent_track_id == (g.track_id || g.waypoint_id));
                myChildren.forEach(child => {
                    html += renderGeomUI(child, true);
                });

                return html;
            };

            let finalGeomHtml = '';
            parents.forEach(p => {
                finalGeomHtml += renderGeomUI(p);
            });

            accordionEl.innerHTML = finalGeomHtml || `<div style="color: #a0aec0; font-size: 0.8em; font-style: italic; padding: 5px 0;">No locations attached.</div>`;

            taskContainer.appendChild(taskEl);
            taskContainer.appendChild(accordionEl);

            // Create a specific drop-zone container for subtasks
            const subtaskListContainer = document.createElement('div');
            subtaskListContainer.className = 'sortable-task-list subtask-list';
            subtaskListContainer.dataset.parentId = task.task_id;
            subtaskListContainer.style.minHeight = '10px';
            subtaskListContainer.style.marginLeft = '20px';
            subtaskListContainer.style.marginTop = '5px';

            taskContainer.appendChild(subtaskListContainer);
            parentContainer.appendChild(taskContainer);

            // Recursion: Find and render children inside the new drop zone
            const subtasks = allTasks.filter(t => t.parent_id === task.task_id);
            subtasks.forEach(st => renderTaskCard(subtaskListContainer, st, gridCols, allTasks));

            return taskContainer;
        }

        async function createSubtask(parentId, dayLabel) {


            const name = prompt("Enter subtask name:");
            if (!name) return;
            await authFetch(`${API_URL}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_name: name, day_label: dayLabel, parent_id: parentId })
            });
            refreshData();
        }

        async function createInlineTask(inputElement, sectionId, sectionTitle) {
            const taskName = inputElement.value.trim();
            if (!taskName) return;

            // Find the associated Fite checkbox
            const checkbox = inputElement.parentElement.querySelector('.inline-fite-checkbox');
            const isMilestone = checkbox ? checkbox.checked : false;

            inputElement.disabled = true;
            if (checkbox) checkbox.disabled = true;

            try {
                const payload = {
                    task_name: taskName,
                    section_id: sectionId,
                    day_label: sectionTitle === 'Unscheduled' ? null : sectionTitle,
                    is_milestone: isMilestone
                };

                console.log("DEBUG: Inline Task Payload ->", payload); // <-- Debugging
                const res = await authFetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(await res.text()); // <-- Strict error throwing
                refreshData();
            } catch (e) {
                console.error("DEBUG: Inline Task Error ->", e);
                alert("Server Error: " + e.message);
                inputElement.disabled = false;
            }
        }

        function openStreetView(lat, lng) {
            const svUrl = `http://googleusercontent.com/maps.google.com/${lat},${lng}`;
            window.open(svUrl, '_blank');
        }

        function startEditGeometry(taskId, anchorId) {
            const task = AppStore.get('itinerary').find(t => t.task_id === taskId);
            const geom = task?.geometries.find(g => g.anchor_id === anchorId);
            if (!geom) {
                alert("Geometry not found!");
                return;
            }

            // Clear any lingering mapbox popups
            const popups = document.getElementsByClassName("mapboxgl-popup");
            while (popups.length > 0) {
                popups[0].remove();
            }

            isEditingGeometry = true;
            AppStore.set('activeTaskId', taskId);

            draw.deleteAll();
            let centerPoint;
            const editConfig = { kind: geom.kind, id: geom.waypoint_id || geom.track_id };

            if (geom.kind === 'point') {
                const feature = { type: 'Feature', id: 'edit-point', geometry: { type: 'Point', coordinates: [geom.lng, geom.lat] }, properties: {} };
                draw.add(feature);

                // CRITICAL FIX: Points must use 'simple_select' to be moved, not 'direct_select'!
                draw.changeMode('simple_select', { featureIds: ['edit-point'] });

                centerPoint = [geom.lng, geom.lat];
                showGeometryContextPopup(centerPoint, feature.geometry, geom.title, '', editConfig, geom.icon, geom.color, geom.link);
            } else if (geom.geojson) {
                const feature = geom.geojson.features[0];

                // 1. MapboxDraw requires an explicit string/number ID to use direct_select
                feature.id = feature.id || "edit-track";

                // 2. Add the track to the drawing layer
                draw.add(feature);

                // 3. Activate Komoot-style vertex editing
                draw.changeMode("direct_select", { featureId: feature.id });

                centerPoint = feature.geometry.type === "Polygon" ? feature.geometry.coordinates[0][0] : feature.geometry.coordinates[Math.floor(feature.geometry.coordinates.length / 2)];
                showGeometryContextPopup(centerPoint, feature.geometry, geom.title, "", editConfig, "📈", geom.color, geom.link);
            }
        }

        function renderSectionUI(section, tasks, gridCols) {
            const container = document.getElementById('asana-container');
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'asana-section';

            const dateVal = section.section_date ? new Date(section.section_date).toISOString().split('T')[0] : '';
            const sectionTitle = section.title || 'Unscheduled';
            const sectionDesc = section.description || 'Add description...';

            sectionDiv.innerHTML = `
                <div class="asana-header" style="display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; cursor: pointer;"
                     onclick="const content = this.parentElement.querySelector('.section-content'); content.classList.toggle('collapsed'); this.querySelector('.section-toggle-icon').classList.toggle('collapsed');">
                    <span class="section-toggle-icon" style="flex-shrink: 0;">▼</span>
                    ${section.id ? `<input type="date" value="${dateVal}" class="inline-edit-input" style="width: 35px; overflow:hidden; padding:0; border:none; flex-shrink: 0;" onchange="updateSectionMetadata(${section.id}, 'section_date', this.value)" onclick="event.stopPropagation()">` : ''}
                    <span class="inline-edit section-title-text" contenteditable="true" style="font-weight: bold; flex-shrink: 0;" onblur="updateSectionMetadata(${section.id}, 'title', this.innerText)" onclick="event.stopPropagation()">${sectionTitle}</span>
                    <span class="inline-edit" contenteditable="true"
                          onblur="updateSectionMetadata(${section.id}, 'description', this.innerText)"
                          onclick="event.stopPropagation()"
                          style="font-size: 0.85em; color: #95a5a6; font-style: italic; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                          ${sectionDesc}
                    </span>
                    <div style="display:flex; gap:2px; margin-left:auto; flex-shrink: 0;" onclick="event.stopPropagation()">
                        <button class="edit-btn" title="Center Map" onclick="event.stopPropagation(); flyToSection(${section.id || null})">🎯</button>
                        ${section.id ? `<button class="delete-btn" title="Delete Section" onclick="event.stopPropagation(); deleteSection(${section.id}, '${sectionTitle.replace(/'/g, "\\'")}')">🗑️</button>` : ''}
                    </div>
                </div>
                <div class="section-content">
                </div>
            `;

            const taskListContainer = document.createElement('div');
            taskListContainer.className = 'sortable-task-list';
            taskListContainer.dataset.sectionId = section.id || 'null';

            tasks.forEach(task => {
                if (!task.parent_id) renderTaskCard(taskListContainer, task, gridCols, AppStore.get('itinerary'));
            });

            const inlineAdd = document.createElement('div');
            inlineAdd.style.padding = '10px 15px';
            inlineAdd.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; border-bottom: 1px dashed #ccc;">
                    <input type="text" placeholder="+ Add task..." style="flex: 1; border:none; padding:5px; outline:none; background:transparent; font-size:0.9em;" onkeydown="if(event.key==='Enter') createInlineTask(this, ${section.id || null}, '${sectionTitle.replace(/'/g, "\\'")}')">
                    <label style="font-size: 0.8em; color: #7f8c8d; cursor:pointer; margin:0; display:flex; align-items:center; gap:4px;">
                        <input type="checkbox" class="inline-fite-checkbox"> 📍 Fite
                    </label>
                </div>
            `;

            const sectionContent = sectionDiv.querySelector('.section-content');
            sectionContent.appendChild(taskListContainer);
            sectionContent.appendChild(inlineAdd);
            container.appendChild(sectionDiv);
        }

        // GPX Upload Handler
        document.getElementById('gpx-file').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    const gpxString = event.target.result;
                    const parser = new DOMParser();
                    const gpxXml = parser.parseFromString(gpxString, "text/xml");

                    // Convert GPX to GeoJSON using the imported toGeoJSON library
                    const geojson = toGeoJSON.gpx(gpxXml);

                    if (geojson && geojson.features.length > 0) {
                        draw.deleteAll();
                        draw.add(geojson);

                        const feature = geojson.features[0];
                        const centerPoint = feature.geometry.type === 'Polygon' ? feature.geometry.coordinates[0][0] : feature.geometry.coordinates[Math.floor(feature.geometry.coordinates.length / 2)];

                        // Send straight to the Context Popup
                        showGeometryContextPopup(centerPoint, feature.geometry, file.name.replace('.gpx', ''), '');

                        // Zoom map to the uploaded track bounds
                        const bbox = turf.bbox(geojson);
                        map.fitBounds(bbox, { padding: 50 });
                    } else {
                        alert("Could not extract valid track data from this GPX file.");
                    }
                } catch (err) {
                    console.error("GPX Parsing Error:", err);
                    alert("Error parsing GPX file.");
                }
                // Clear the input so the same file can be uploaded again if needed
                e.target.value = '';
            };
            reader.readAsText(file);
        });



        let activeTypeIdForEdit = null;
        function updateTaskTypeDropdowns() {
            const typeSelect = document.getElementById('task-type-id');
            const filterSelect = document.getElementById('type-filter');
            if (!typeSelect || !filterSelect) return;

            const currentVal = typeSelect.value;
            const currentFilterVal = filterSelect.value;

            typeSelect.innerHTML = '<option value="">No Type</option>';
            filterSelect.innerHTML = '<option value="">All Types</option>';

            allTaskTypes.forEach(t => {
                const opt = `<option value="${t.id}">${t.icon || '🏷️'} ${t.name}</option>`;
                typeSelect.insertAdjacentHTML('beforeend', opt);
                filterSelect.insertAdjacentHTML('beforeend', opt);
            });

            typeSelect.value = currentVal;
            filterSelect.value = currentFilterVal;
        }

        function renderTaskTypeList() {
            const list = document.getElementById('type-list');
            if (!list) return;
            list.innerHTML = allTaskTypes.map(t => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #eee;">
                    <span>${t.icon} <strong style="color:${t.color}">${t.name}</strong></span>
                    <div style="display:flex; gap:5px;">
                        <button onclick="startEditTaskType(${t.id})" style="width:auto; padding:4px 8px; background:#3498db; font-size:12px;">Edit</button>
                        <button onclick="deleteTaskType(${t.id})" style="width:auto; padding:4px 8px; background:#e74c3c; font-size:12px;">Delete</button>
                    </div>
                </div>
            `).join('') || '<p style="font-size:12px; color:#95a5a6;">No types created yet.</p>';
        }

        function startEditTaskType(id) {
            const t = allTaskTypes.find(x => x.id === id);
            if (!t) return;
            activeTypeIdForEdit = id;
            document.getElementById('new-type-name').value = t.name;
            document.getElementById('new-type-color').value = t.color || '#95a5a6';
            document.getElementById('new-type-icon').value = t.icon || '';
            const btn = document.querySelector('#type-modal button[onclick="saveTaskType()"]');
            btn.innerText = "Update Type";
            btn.style.background = "#f39c12";
        }

        async function deleteTaskType(id) {
            if (!confirm("Delete this task type?")) return;
            await authFetch(`${API_URL}/task_types/${id}`, { method: 'DELETE' });
            refreshData();
        }

        async function saveTaskType() {
            const name = document.getElementById('new-type-name').value;
            const color = document.getElementById('new-type-color').value;
            const icon = document.getElementById('new-type-icon').value;
            if (!name) return alert("Name is required");

            const method = activeTypeIdForEdit ? 'PUT' : 'POST';
            const url = activeTypeIdForEdit ? `${API_URL}/task_types/${activeTypeIdForEdit}` : `${API_URL}/task_types`;

            await authFetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color, icon })
            });

            activeTypeIdForEdit = null;
            document.getElementById('new-type-name').value = '';
            document.getElementById('new-type-color').value = '#95a5a6';
            document.getElementById('new-type-icon').value = '';
            const btn = document.querySelector('#type-modal button[onclick="saveTaskType()"]');
            btn.innerText = "Create Type";
            btn.style.background = "#27ae60";
            refreshData();
        }

        function _isValidLngLat(lng, lat) {
            return typeof lng === 'number' && typeof lat === 'number' && isFinite(lng) && isFinite(lat);
        }

        function _geometryHasValidCoords(geojson) {
            try {
                const coords = turf.coordAll(geojson);
                return coords.length > 0 && coords.every(c => _isValidLngLat(c[0], c[1]));
            } catch (e) { return false; }
        }

        initializeApp();


    </script>
