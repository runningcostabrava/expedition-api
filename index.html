                    <span class="inline-edit section-title-text" style="font-weight: bold; flex-shrink: 0; font-size: 0.95em; color: #1e293b;" onblur="updateSectionMetadata(${section.id}, 'title', this.innerText)" onclick="if(this.closest('.is-editing')) event.stopPropagation();">${sectionTitle}</span>
                    
                    <div class="task-actions-modern" style="display:flex; gap:2px; margin-left:auto; flex-shrink: 0; opacity: 1;" onclick="event.stopPropagation()">
                        <button class="action-btn-modern" title="Edit Inline" onclick="event.stopPropagation(); toggleInlineEdit('section-${section.id || 'null'}')">✏️</button>
                        ${section.id ? `<button class="action-btn-modern" title="Section Details" onclick="event.stopPropagation(); openSectionEditor(${section.id})">ℹ️</button>` : ''}
                        ${section.id ? `<button class="action-btn-modern del" title="Delete Section" onclick="event.stopPropagation(); deleteSection(${section.id}, '${sectionTitle.replace(/'/g, "\\'")}')">🗑️</button>` : ''}
                    </div>
                </div>
                <div class="section-content collapsed"></div>
            `;

            const taskListContainer = document.createElement('div');
            taskListContainer.className = 'sortable-task-list';
            taskListContainer.dataset.sectionId = section.id || 'null';

            tasks.forEach(task => {
                if (!task.parent_id) renderTaskCard(taskListContainer, task, gridCols, AppStore.get('itinerary'));
            });

            const inlineAdd = document.createElement('div');
            inlineAdd.style.padding = '8px 10px';
            inlineAdd.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 4px;">
                    <input type="text" placeholder="+ Add task..." style="flex: 1; border:none; outline:none; background:transparent; font-size:0.85em;" onkeydown="if(event.key==='Enter') createInlineTask(this, ${section.id || null}, '${sectionTitle.replace(/'/g, "\\'")}')">
                    <label style="font-size: 0.8em; color: #7f8c8d; cursor:pointer; margin:0; display:flex; align-items:center; gap:4px;">
                        <input type="checkbox" class="inline-fite-checkbox"> 📍 Fite
                    </label>
                </div>
            `;

            const sectionContent = sectionDiv.querySelector('.section-content');
            sectionContent.appendChild(taskListContainer);
            sectionContent.appendChild(inlineAdd);
            container.appendChild(sectionDiv);
        }

        // GPX Upload Handler (Komoot Engine)
        document.getElementById('gpx-file').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            KomootEngine.handleGpxUpload(file);
            e.target.value = ''; // Reset input
        });


        let activeTypeIdForEdit = null;
        function updateTaskTypeDropdowns() {
            const typeSelect = document.getElementById('task-type-id');
            const filterSelect = document.getElementById('type-filter');
            if (!typeSelect || !filterSelect) return;

            const currentVal = typeSelect.value;
            const currentFilterVal = filterSelect.value;

            typeSelect.innerHTML = '<option value="">No Type</option>';
            filterSelect.innerHTML = '<option value="">All Types</option>';

            allTaskTypes.forEach(t => {
                const opt = `<option value="${t.id}">${t.icon || '🏷️'} ${t.name}</option>`;
                typeSelect.insertAdjacentHTML('beforeend', opt);
                filterSelect.insertAdjacentHTML('beforeend', opt);
            });

            typeSelect.value = currentVal;
            filterSelect.value = currentFilterVal;
        }

        function renderTaskTypeList() {
            const list = document.getElementById('type-list');
            if (!list) return;
            list.innerHTML = allTaskTypes.map(t => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #eee;">
                    <span>${t.icon} <strong style="color:${t.color}">${t.name}</strong></span>
                    <div style="display:flex; gap:5px;">
                        <button onclick="startEditTaskType(${t.id})" style="width:auto; padding:4px 8px; background:#3498db; font-size:12px;">Edit</button>
                        <button onclick="deleteTaskType(${t.id})" style="width:auto; padding:4px 8px; background:#e74c3c; font-size:12px;">Delete</button>
                    </div>
                </div>
            `).join('') || '<p style="font-size:12px; color:#95a5a6;">No types created yet.</p>';
        }

        function startEditTaskType(id) {
            const t = allTaskTypes.find(x => x.id === id);
            if (!t) return;
            activeTypeIdForEdit = id;
            document.getElementById('new-type-name').value = t.name;
            document.getElementById('new-type-color').value = t.color || '#95a5a6';
            document.getElementById('new-type-icon').value = t.icon || '';
            const btn = document.querySelector('#type-modal button[onclick="saveTaskType()"]');
            btn.innerText = "Update Type";
            btn.style.background = "#f39c12";
        }

        async function deleteTaskType(id) {
            if (!confirm("Delete this task type?")) return;
            await authFetch(`${API_URL}/task_types/${id}`, { method: 'DELETE' });
            refreshData();
        }

        async function saveTaskType() {
            const name = document.getElementById('new-type-name').value;
            const color = document.getElementById('new-type-color').value;
            const icon = document.getElementById('new-type-icon').value;
            if (!name) return alert("Name is required");

            const method = activeTypeIdForEdit ? 'PUT' : 'POST';
            const url = activeTypeIdForEdit ? `${API_URL}/task_types/${activeTypeIdForEdit}` : `${API_URL}/task_types`;

            await authFetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color, icon })
            });

            activeTypeIdForEdit = null;
            document.getElementById('new-type-name').value = '';
            document.getElementById('new-type-color').value = '#95a5a6';
            document.getElementById('new-type-icon').value = '';
            const btn = document.querySelector('#type-modal button[onclick="saveTaskType()"]');
            btn.innerText = "Create Type";
            btn.style.background = "#27ae60";
            refreshData();
        }

        function _isValidLngLat(lng, lat) {
            return typeof lng === 'number' && typeof lat === 'number' && isFinite(lng) && isFinite(lat);
        }

        function _geometryHasValidCoords(geojson) {
            try {
                const coords = turf.coordAll(geojson);
                return coords.length > 0 && coords.every(c => _isValidLngLat(c[0], c[1]));
            } catch (e) { return false; }
        }

        function toggleGeomVisibility(kind, id, btn) {
            if (kind === 'point') {
                const marker = activeMarkers.find(m => m.getElement().dataset.anchorId == id || m.getLngLat().lng == id); // Fallback logic
                if (marker) {
                    const el = marker.getElement();
                    const isHidden = el.style.opacity === '0';
                    el.style.opacity = isHidden ? '1' : '0';
                    el.style.pointerEvents = isHidden ? 'auto' : 'none';
                    btn.innerText = isHidden ? '👁️' : '🙈';
                }
            } else {
                const layerId = `layer-${id}`;
                if (map.getLayer(layerId)) {
                    const currentVis = map.getLayoutProperty(layerId, 'visibility') || 'visible';
                    const nextVis = currentVis === 'visible' ? 'none' : 'visible';
                    map.setLayoutProperty(layerId, 'visibility', nextVis);
                    btn.innerText = nextVis === 'visible' ? '👁️' : '🙈';
                }
            }
        }

        function openTaskDetailPanel(task) {
            const panel = document.getElementById('task-detail-panel');
            const content = document.getElementById('task-detail-content');
            if (!panel || !content) return;

            // Wire up the edit button in the header
            const editBtn = document.getElementById('detail-edit-btn');
            if (editBtn) editBtn.onclick = () => openTaskEditor(task.task_id);

            let html = `
                <h2 style="margin: 0 0 15px 0; font-size: 1.5em; color: #0f172a; line-height: 1.2;">${task.task_name}</h2>
                <div style="font-size: 0.9em; color: #64748b; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap;">
                    ${task.starts_at ? `<span style="background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: bold;">🕒 ${task.starts_at.substring(11, 16)}</span>` : ''}
                    ${task.responsible ? `<span style="background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: bold;">👤 ${task.responsible}</span>` : ''}
                </div>
                ${task.characteristics ? `<div style="font-size: 0.95em; line-height: 1.6; color: #334155; margin-bottom: 30px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">${task.characteristics}</div>` : ''}

                <h3 style="font-size: 1.1em; color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px;">Route & Waypoints</h3>
            `;

            if (task.geometries && task.geometries.length > 0) {
                task.geometries.forEach(g => {
                    const icon = g.kind === 'point' ? (g.icon || '📍') : (g.kind === 'polygon' ? '🛑' : '📈');
                    const title = g.title || 'Location';
                    const layerId = `layer-${g.track_id}`;
                    let statsHtml = '';

                    // On-the-fly stat calculation for the compact view
                    let d = g.distance;
                    let elevGain = g.gain;
                    let elevLoss = g.loss;

                    if (g.kind === 'line' && g.geojson) {
                        const coords = g.geojson.features[0].geometry.type === 'Polygon' ? g.geojson.features[0].geometry.coordinates[0] : g.geojson.features[0].geometry.coordinates;
                        if (!d || d == 0) d = turf.length(g.geojson, { units: 'kilometers' }).toFixed(2);
                        if (!elevGain && !elevLoss) {
                            let cg = 0, cl = 0;
                            for (let i = 1; i < coords.length; i++) {
                                const diff = (coords[i][2] || 0) - (coords[i - 1][2] || 0);
                                if (diff > 0) cg += diff; else cl -= diff;
                            }
                            elevGain = cg.toFixed(0);
                            elevLoss = cl.toFixed(0);
                        }
                    }

                    if (d) statsHtml += `<span style="color:#475569;">📏 ${parseFloat(d).toFixed(2)}km</span>`;
                    if (elevGain) statsHtml += `<span style="color:#16a34a;">▲ +${parseFloat(elevGain).toFixed(0)}m</span>`;
                    if (elevLoss) statsHtml += `<span style="color:#dc2626;">▼ -${Math.abs(parseFloat(elevLoss)).toFixed(0)}m</span>`;

                    // Check if it's a child track to indent it
                    const isChild = g.parent_track_id ? 'margin-left: 20px; border-left: 2px solid #cbd5e0;' : '';

                    html += `
                        <div class="compact-geom-row" style="${isChild}" onclick="flyToGeometry(${g.lng}, ${g.lat}, '${g.kind}', '${layerId}'); openGeomEditor('${g.kind}', ${g.waypoint_id || g.track_id});">
                            <span style="font-size: 1.4em;">${icon}</span>
                            <div class="geom-info">
                                <div class="geom-title">${title}</div>
                                <div class="geom-stats">${statsHtml || 'No stats recorded'}</div>
                            </div>
                            <div style="display:flex; gap:6px;">
                                <button class="action-btn-modern" title="Details & Metadata" onclick="event.stopPropagation(); openGeomEditor('${g.kind}', ${g.waypoint_id || g.track_id})">ℹ️</button>
                                <button class="action-btn-modern" title="Show/Hide" onclick="event.stopPropagation(); toggleGeomVisibility('${g.kind}', '${g.track_id || g.anchor_id}', this)">👁️</button>
                                <button class="action-btn-modern" title="Edit Geometry" onclick="event.stopPropagation(); startEditGeometry(${task.task_id}, ${g.anchor_id})">⚙️</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div style="color: #94a3b8; font-size: 0.95em; font-style: italic; padding: 10px 0;">No locations or tracks attached to this task.</div>`;
            }

            content.innerHTML = html;
            panel.classList.add('open');
        }

        function closeTaskDetailPanel() {
            const panel = document.getElementById('task-detail-panel');
            if (panel) panel.classList.remove('open');
            // Remove active highlighting from sidebar
            //document.querySelectorAll('.task-row, .fite-row').forEach(row => row.classList.remove('active-task'));
            // AppStore.set('activeTaskId', null);
        }

        // --- 📅 SECTION METADATA EDITOR ---
        function openSectionEditor(sectionId) {
            const section = AppStore.get('sections').find(s => s.id === sectionId);
            if (!section) return;

            const dateVal = section.section_date ? new Date(section.section_date).toISOString().split('T')[0] : '';
            const safeTitle = (section.title || '').replace(/"/g, '"');
            const safeDesc = (section.description || '').replace(/"/g, '"');

            const html = `
                <div style="display:flex; flex-direction:column; gap:15px;">
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Section Title</label>
                        <input type="text" id="edit-sec-title" value="${safeTitle}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Date</label>
                        <input type="date" id="edit-sec-date" value="${dateVal}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Day Description / Notes</label>
                        <textarea id="edit-sec-desc" rows="6" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box; font-family:inherit; resize:vertical;">${safeDesc}</textarea>
                    </div>
                    <button onclick="saveSectionFromRightPanel(${section.id})" style="width:100%; padding:14px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold; font-size:1.05em; margin-top:5px; cursor:pointer; box-shadow:0 4px 10px rgba(39, 174, 96, 0.3);">💾 UPDATE SECTION</button>
                </div>
            `;
            openRightPanel(`📅 Edit Section`, html);
        }

        async function saveSectionFromRightPanel(sectionId) {
            const payload = {
                title: document.getElementById('edit-sec-title').value,
                section_date: document.getElementById('edit-sec-date').value || null,
                description: document.getElementById('edit-sec-desc').value
            };
            try {
                await authFetch(`${API_URL}/sections/${sectionId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                closeRightPanel();
                refreshData();
                if (typeof showToast !== 'undefined') showToast("Section updated", "success");
            } catch (err) { alert("Error: " + err.message); }
        }

        // --- 📍 GEOMETRY METADATA EDITOR ---
        function openGeomEditor(kind, id) {
            let geom = null;
            AppStore.get('itinerary').forEach(task => {
                if (task.geometries) {
                    const found = task.geometries.find(g => (kind === 'point' ? g.waypoint_id === id : g.track_id === id));
                    if (found) geom = found;
                }
            });
            if (!geom) return;

            const safeTitle = (geom.title || '').replace(/"/g, '"');
            const safeComments = (geom.comments || '').replace(/"/g, '"');
            const safeAddress = (geom.address || '').replace(/"/g, '"');
            const safePhone = (geom.phone || '').replace(/"/g, '"');
            const safeLink = (geom.link || '').replace(/"/g, '"');
            const safePhoto = (geom.photo_url || '').replace(/"/g, '"');

            const html = `
                <div style="display:flex; flex-direction:column; gap:15px;">
                    ${safePhoto ? `<img src="${safePhoto}" style="width:100%; height:140px; object-fit:cover; border-radius:8px;">` : ''}
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Location Name</label>
                        <input type="text" id="edit-geom-title" value="${safeTitle}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                    </div>
                    ${kind === 'point' ? `
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Address</label>
                        <input type="text" id="edit-geom-address" value="${safeAddress}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1;">
                            <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Phone</label>
                            <input type="text" id="edit-geom-phone" value="${safePhone}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                        </div>
                        <div style="flex:1;">
                            <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Photo URL</label>
                            <input type="text" id="edit-geom-photo" value="${safePhoto}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                        </div>
                    </div>
                    ` : ''}
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Website Link</label>
                        <input type="text" id="edit-geom-link" value="${safeLink}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.85em; font-weight:bold; margin-bottom:5px; color:#34495e;">Comments / Notes</label>
                        <textarea id="edit-geom-comments" rows="4" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box; font-family:inherit; resize:vertical;">${safeComments}</textarea>
                    </div>
                    <button onclick="saveGeomFromRightPanel('${kind}', ${id})" style="width:100%; padding:14px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold; font-size:1.05em; margin-top:5px; cursor:pointer; box-shadow:0 4px 10px rgba(39, 174, 96, 0.3);">💾 UPDATE DETAILS</button>
                </div>
            `;
            openRightPanel(`ℹ️ Location Details`, html);
        }

        async function saveGeomFromRightPanel(kind, id) {
            const payload = {
                title: document.getElementById('edit-geom-title').value,
                link: document.getElementById('edit-geom-link').value,
                comments: document.getElementById('edit-geom-comments').value,
            };

            if (kind === 'point') {
                payload.address = document.getElementById('edit-geom-address').value;
                payload.phone = document.getElementById('edit-geom-phone').value;
                payload.photo_url = document.getElementById('edit-geom-photo').value;
            }

            const endpoint = kind === 'point' ? `waypoints/${id}` : `tracks/${id}`;
            try {
                await authFetch(`${API_URL}/${endpoint}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                closeRightPanel();
                refreshData();
                if (typeof showToast !== 'undefined') showToast("Location updated", "success");
            } catch (err) { alert("Error: " + err.message); }
        }

        initializeApp();

        async function saveTaskFromRightPanel(taskId) {
            const task = AppStore.get('itinerary').find(t => t.task_id === taskId);

            // Extract values from the right panel inputs
            const updatedData = {
                ...task,
                task_name: document.getElementById('edit-task-name').value,
                category_id: document.getElementById('edit-task-cat').value || null,
                section_id: document.getElementById('edit-task-sec').value || null,
                characteristics: document.getElementById('edit-task-desc').value,
                responsible: document.getElementById('edit-task-resp').value,
                is_completed: document.getElementById('edit-task-completed').checked
            };

            // Handle Time Update
            const timeVal = document.getElementById('edit-task-time').value;
            if (timeVal) {
                const datePart = task.starts_at ? task.starts_at.split('T')[0] : new Date().toISOString().split('T')[0];
                updatedData.starts_at = `${datePart}T${timeVal}:00.000Z`;
            }

            try {
                const res = await authFetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                if (res.ok) {
                    // Do not call closeRightPanel() yet if you want to keep the context
                    await refreshData();
                    showToast("Task updated", "success");
                }
            } catch (err) {
                showToast("Error updating task", "error");
            }
        }

    </script>
</body>
